<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Portfolio CMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Plus+Jakarta+Sans', sans-serif; background: #050505; color: #fff; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); }
        .admin-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; font-size: 14px; outline: none; transition: all 0.3s; color: #fff; }
        .admin-input:focus { border-color: #06b6d4; box-shadow: 0 0 15px rgba(6,182,212,0.1); }
        .gradient-text { background: linear-gradient(135deg, #06b6d4, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen">
    <!-- Auth Shield -->
    <div id="admin-auth" class="fixed inset-0 z-[100] bg-[#050505] flex items-center justify-center p-6">
        <div class="max-w-md w-full glass-card p-10 rounded-3xl text-center space-y-6 shadow-2xl">
            <h1 class="text-3xl font-extrabold gradient-text tracking-tighter">Command Center</h1>
            <p class="text-xs text-gray-400 uppercase tracking-widest font-bold">Secure Access Required</p>
            <input type="password" id="admin-password" placeholder="••••••••" class="admin-input text-center text-lg tracking-widest">
            <button onclick="verifyAuth()" class="w-full py-4 bg-white text-black font-extrabold rounded-2xl hover:scale-[1.02] active:scale-95 transition-all text-xs uppercase tracking-widest shadow-xl">Identify Self</button>
        </div>
    </div>

    <!-- Main CMS -->
    <div id="admin-dashboard" class="hidden p-6 lg:p-12 max-w-7xl mx-auto space-y-12">
        <header class="flex flex-col md:flex-row md:items-center justify-between pb-8 border-b border-white/5 gap-6">
            <div>
                <div class="flex items-center space-x-3 mb-2">
                    <h1 class="text-4xl font-extrabold tracking-tighter">System Console</h1>
                    <button id="health-btn" onclick="checkSyncHealth()" class="px-2 py-1 rounded bg-cyan-500/10 text-cyan-500 text-[8px] font-bold uppercase tracking-widest border border-cyan-500/20">Test Connection</button>
                </div>
                <p class="text-xs text-gray-500 font-bold uppercase tracking-widest flex items-center"><span class="w-2 h-2 bg-green-500 rounded-full mr-2 animate-ping"></span> Cloud Synced & Medical Grade</p>
            </div>
            
            <div class="flex items-center space-x-4">
                <button onclick="saveChanges()" class="px-8 py-4 bg-cyan-500 text-white font-extrabold rounded-2xl hover:bg-cyan-400 transition-all text-xs uppercase tracking-widest shadow-lg shadow-cyan-500/20">Push to Live</button>
                <a href="index.html" class="px-4 py-4 glass-card rounded-2xl text-gray-400 hover:text-white transition-all"><i data-lucide="external-link" class="h-5 w-5"></i></a>
            </div>
        </header>

        <div class="grid lg:grid-cols-4 gap-8">
            <!-- Sidebar: Assets & Controls -->
            <div class="space-y-8">
                <div class="glass-card p-6 rounded-2xl space-y-4">
                    <h3 class="text-xs font-bold text-purple-400 uppercase tracking-widest">Identity Branding</h3>
                    <input type="text" id="edit-logo-text" placeholder="Logo Text (SP.)" class="admin-input">
                    <div class="relative w-32 h-32 rounded-2xl overflow-hidden bg-black/40 border border-white/10 group mx-auto">
                        <img id="admin-profile-preview" src="https://ui-avatars.com/api/?name=Admin&background=06b6d4&color=fff&size=512" class="w-full h-full object-cover">
                        <label class="absolute inset-0 bg-black/60 flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer">
                            <i data-lucide="camera" class="h-6 w-6 mb-2"></i>
                            <span class="text-[8px] uppercase font-bold text-white">Update</span>
                            <input type="file" id="photo-upload" class="hidden" accept="image/*">
                        </label>
                    </div>
                </div>

                <div class="glass-card p-6 rounded-2xl space-y-4">
                    <h3 class="text-xs font-bold text-cyan-400 uppercase tracking-widest">Mastery & Software</h3>
                    <div id="software-editor-list" class="space-y-4"></div>
                    <button onclick="addItem('software')" class="w-full py-2 border border-cyan-500/20 rounded-xl text-[8px] uppercase font-bold hover:bg-cyan-500/10">+ New Tool</button>
                </div>

                <div class="glass-card p-6 rounded-2xl space-y-4">
                    <h3 class="text-xs font-bold text-purple-400 uppercase tracking-widest">Section Visibility</h3>
                    <div id="section-toggles" class="space-y-2"></div>
                    <button onclick="createNewSection()" class="w-full py-2 bg-purple-500/10 text-purple-400 border border-purple-500/20 rounded-xl text-[8px] font-bold uppercase hover:bg-purple-500/20 mt-4">+ Add Custom Section</button>
                </div>
            </div>

            <!-- Main Workspace: Structured Forms -->
            <div class="lg:col-span-3 space-y-8">
                <div class="glass-card p-8 rounded-3xl space-y-6">
                    <div class="flex justify-between items-center">
                        <h3 class="text-xs font-bold text-cyan-400 uppercase tracking-widest">Global Profile</h3>
                        <i data-lucide="user" class="h-4 w-4 text-gray-600"></i>
                    </div>
                    <div class="grid md:grid-cols-2 gap-4">
                        <input type="text" id="edit-name" placeholder="Full name" class="admin-input">
                        <input type="text" id="edit-title" placeholder="Medical Title" class="admin-input">
                        <input type="text" id="edit-location" placeholder="Location" class="admin-input">
                        <input type="text" id="edit-edu-short" placeholder="Education Short" class="admin-input">
                        <input type="text" id="edit-email" placeholder="Email" class="admin-input">
                        <input type="text" id="edit-phone" placeholder="Phone" class="admin-input">
                        <input type="text" id="edit-linkedin" placeholder="LinkedIn URL" class="admin-input">
                    </div>
                    <textarea id="edit-bio" rows="4" placeholder="Professional Bio" class="admin-input"></textarea>
                </div>

                <div class="glass-card p-8 rounded-3xl space-y-6">
                    <div class="flex justify-between items-center">
                        <h3 class="text-xs font-bold text-cyan-400 uppercase tracking-widest">Professional Path</h3>
                        <button onclick="addItem('experience')" class="text-[8px] text-cyan-400 hover:underline">NEW</button>
                    </div>
                    <div id="experience-editor-list" class="space-y-4"></div>
                </div>

                <div class="glass-card p-8 rounded-3xl space-y-6">
                    <div class="flex justify-between items-center">
                        <h3 class="text-xs font-bold text-cyan-400 uppercase tracking-widest">Core Competencies</h3>
                        <button onclick="addItem('competencies')" class="text-[8px] text-cyan-400 hover:underline">NEW</button>
                    </div>
                    <div id="competencies-editor-list" class="space-y-4"></div>
                </div>

                <div class="glass-card p-8 rounded-3xl space-y-6">
                    <div class="flex justify-between items-center">
                        <h3 class="text-xs font-bold text-cyan-400 uppercase tracking-widest">Certificates</h3>
                        <button onclick="addItem('certificates')" class="text-[8px] text-cyan-400 hover:underline">NEW</button>
                    </div>
                    <div id="certificates-editor-list" class="grid sm:grid-cols-2 gap-4"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initAdmin();
        });
    </script>
</body>
</html>
