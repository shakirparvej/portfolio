<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Dr. Shakir Parvej</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK (v9 compatibility) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .gradient-bg {
            background: linear-gradient(135deg, #06b6d4, #8b5cf6);
        }
    </style>
</head>
<body class="selection:bg-cyan-500/30 selection:text-cyan-400 p-4 md:p-8">

    <!-- Auth Guard -->
    <div id="admin-auth" class="fixed inset-0 z-50 flex items-center justify-center bg-[#050505]">
        <div class="glass-card p-12 rounded-[2rem] w-full max-w-md text-center space-y-8">
            <h1 class="text-4xl font-bold tracking-tighter">SECURE <span class="text-cyan-400">ACCESS.</span></h1>
            <input type="password" id="admin-password" placeholder="••••••••" class="w-full bg-white/5 border border-white/10 rounded-2xl px-8 py-5 text-center text-3xl tracking-[0.5em] focus:outline-none focus:border-cyan-500/50">
            <button onclick="verifyAuth()" class="w-full py-5 gradient-bg rounded-2xl font-bold uppercase tracking-widest text-xs hover:scale-[1.02] transition-all">Unlock Portfolio</button>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest">Administrative Console v7.0</p>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="admin-dashboard" class="hidden max-w-7xl mx-auto space-y-8 pb-24">
        <header class="flex flex-col md:flex-row justify-between items-center bg-[#050505]/80 backdrop-blur-xl sticky top-0 py-6 z-40 gap-4">
            <div>
                <h1 class="text-3xl font-bold tracking-tighter">DASHBOARD<span class="text-cyan-400">.</span></h1>
                <p class="text-xs text-gray-500 uppercase tracking-widest">Real-time Cloud Sync Enabled</p>
            </div>
            <div class="flex space-x-4 w-full md:w-auto">
                <button onclick="saveChanges()" class="flex-grow md:flex-none px-8 py-3 bg-green-500/20 text-green-400 border border-green-500/30 rounded-xl text-xs font-bold uppercase tracking-widest hover:bg-green-500/30 transition-all">Push to Live</button>
                <button onclick="location.href='index.html'" class="flex-grow md:flex-none px-8 py-3 glass-card rounded-xl text-xs font-bold uppercase tracking-widest">View Site</button>
            </div>
        </header>

        <div class="grid lg:grid-cols-3 gap-8">
            <!-- Basic Info -->
            <div class="lg:col-span-2 space-y-8">
                <div class="glass-card p-8 rounded-3xl space-y-6">
                    <h3 class="text-xs font-bold text-cyan-400 uppercase tracking-[0.3em] mb-4">Core Identification</h3>
                    <div class="grid md:grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-[10px] uppercase font-bold text-gray-500">Full Name</label>
                            <input type="text" id="edit-name" class="w-full bg-white/5 border border-white/5 rounded-xl px-4 py-3 focus:border-cyan-500/30 outline-none">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] uppercase font-bold text-gray-500">Medical Title</label>
                            <input type="text" id="edit-title" class="w-full bg-white/5 border border-white/5 rounded-xl px-4 py-3 focus:border-cyan-500/30 outline-none">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] uppercase font-bold text-gray-500">Professional Bio</label>
                        <textarea id="edit-bio" rows="6" class="w-full bg-white/5 border border-white/5 rounded-xl px-4 py-3 focus:border-cyan-500/30 outline-none resize-none"></textarea>
                    </div>
                </div>

                <div class="glass-card p-8 rounded-3xl space-y-6">
                    <h3 class="text-xs font-bold text-purple-400 uppercase tracking-[0.3em] mb-4">Professional Path (JSON)</h3>
                    <textarea id="edit-experience" class="w-full h-64 bg-[#0a0a0a] border border-white/5 rounded-xl px-4 py-3 font-mono text-xs focus:border-cyan-500/30 outline-none"></textarea>
                    <p class="text-[10px] text-gray-600 italic">Format: Multi-entry array with year, role, company, desc</p>
                </div>
            </div>

            <!-- Sidebar Info -->
            <div class="space-y-8">
                <div class="glass-card p-8 rounded-3xl space-y-6">
                    <h3 class="text-xs font-bold text-cyan-400 uppercase tracking-[0.3em] mb-4">Meta Details</h3>
                    <div class="space-y-4">
                        <input type="text" id="edit-location" placeholder="Location (e.g. Noida)" class="w-full bg-white/5 border border-white/5 rounded-xl px-4 py-3 text-sm">
                        <input type="text" id="edit-edu" placeholder="Education" class="w-full bg-white/5 border border-white/5 rounded-xl px-4 py-3 text-sm">
                        <input type="text" id="edit-lang" placeholder="Languages" class="w-full bg-white/5 border border-white/5 rounded-xl px-4 py-3 text-sm">
                        <input type="text" id="edit-email" placeholder="Email" class="w-full bg-white/5 border border-white/5 rounded-xl px-4 py-3 text-sm">
                        <input type="text" id="edit-phone" placeholder="Phone" class="w-full bg-white/5 border border-white/5 rounded-xl px-4 py-3 text-sm">
                    </div>
                </div>

                <div class="glass-card p-8 rounded-3xl space-y-6 text-center">
                    <h3 class="text-xs font-bold text-cyan-400 uppercase tracking-[0.3em] mb-4">Profile Branding</h3>
                    <div class="relative w-32 h-32 mx-auto rounded-full overflow-hidden border-2 border-cyan-500/30 group">
                        <img id="admin-profile-preview" src="./portrait.jpg" class="w-full h-full object-cover">
                        <label class="absolute inset-0 bg-black/60 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer">
                            <i data-lucide="camera" class="h-6 w-6"></i>
                            <input type="file" id="photo-upload" class="hidden" accept="image/*">
                        </label>
                    </div>
                    <p class="text-[10px] text-gray-500 uppercase">Click to upload new portrait</p>
                </div>
            </div>
        </div>

        <!-- Advanced Sections -->
        <div class="grid md:grid-cols-2 gap-8">
            <div class="glass-card p-8 rounded-3xl space-y-4">
                <h3 class="text-xs font-bold text-cyan-400 uppercase tracking-[0.3em]">Competencies</h3>
                <textarea id="edit-competencies" class="w-full h-48 bg-[#0a0a0a] border border-white/5 rounded-xl px-4 py-3 font-mono text-xs"></textarea>
            </div>
            <div class="glass-card p-8 rounded-3xl space-y-4">
                <h3 class="text-xs font-bold text-purple-400 uppercase tracking-[0.3em]">Software Toolkit</h3>
                <textarea id="edit-software" class="w-full h-48 bg-[#0a0a0a] border border-white/5 rounded-xl px-4 py-3 font-mono text-xs"></textarea>
            </div>
        </div>
    </div>

    <!-- Script Entry -->
    <script src="app.js"></script>
    <script>
        // Lucide replacement for internal page
        lucide.createIcons();
    </script>
</body>
</html>
