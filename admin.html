<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio CMS | Dr. Shakir Parvej</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK (v9 compatibility) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .gradient-bg {
            background: linear-gradient(135deg, #06b6d4, #8b5cf6);
        }
        .admin-input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .admin-input:focus {
            border-color: #06b6d4;
        }
        .section-item {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .section-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body class="selection:bg-cyan-500/30 selection:text-cyan-400">

    <!-- Auth Guard -->
    <div id="admin-auth" class="fixed inset-0 z-50 flex items-center justify-center bg-[#050505]">
        <div class="glass-card p-12 rounded-[2rem] w-full max-w-md text-center space-y-8">
            <h1 class="text-4xl font-bold tracking-tighter">SECURE <span class="text-cyan-400">ACCESS.</span></h1>
            <input type="password" id="admin-password" placeholder="••••••••" class="w-full bg-white/5 border border-white/10 rounded-2xl px-8 py-5 text-center text-3xl tracking-[0.5em] focus:outline-none focus:border-cyan-500/50">
            <button onclick="verifyAuth()" class="w-full py-5 gradient-bg rounded-2xl font-bold uppercase tracking-widest text-xs hover:scale-[1.02] transition-all">Unlock Portfolio</button>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest">Administrative Console v8.5</p>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="admin-dashboard" class="hidden max-w-7xl mx-auto px-6 pb-24">
        <header class="flex flex-col md:flex-row justify-between items-center bg-[#050505]/80 backdrop-blur-xl sticky top-0 py-6 z-40 gap-4">
            <div>
                <h1 class="text-3xl font-bold tracking-tighter">DASHBOARD<span class="text-cyan-400">.</span></h1>
                <div class="flex items-center space-x-2 mt-1">
                    <p class="text-xs text-gray-500 uppercase tracking-widest">Dynamic Component Editor</p>
                    <button onclick="checkSyncHealth()" id="health-btn" class="px-2 py-0.5 border border-cyan-500/30 rounded text-[8px] text-cyan-400 hover:bg-cyan-500/10">TEST CONNECTION</button>
                </div>
            </div>
            <div class="flex space-x-4 w-full md:w-auto">
                <button onclick="saveChanges()" class="flex-grow md:flex-none px-8 py-3 bg-green-500/20 text-green-400 border border-green-500/30 rounded-xl text-xs font-bold uppercase tracking-widest hover:bg-green-500/30 transition-all">Push to Live</button>
                <button onclick="location.href='index.html'" class="flex-grow md:flex-none px-8 py-3 glass-card rounded-xl text-xs font-bold uppercase tracking-widest">View Portfolio</button>
            </div>
        </header>
        
        <!-- Rules Alert (Dismissible) -->
        <div id="rules-alert" class="mb-8 p-4 bg-orange-500/10 border border-orange-500/20 rounded-2xl flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <i data-lucide="shield-alert" class="h-4 w-4 text-orange-400"></i>
                <p class="text-[10px] text-orange-400 uppercase font-bold tracking-widest">Check Firebase Rules if uploads hang on "SYNCING..."</p>
            </div>
            <button onclick="this.parentElement.remove()" class="text-orange-400 opacity-50 hover:opacity-100"><i data-lucide="x" class="h-3 w-3"></i></button>
        </div>

        <div class="grid lg:grid-cols-4 gap-8">
            <!-- Sidebar: Navigation & Controls -->
            <div class="lg:col-span-1 space-y-6">
                <div class="glass-card p-6 rounded-2xl space-y-6">
                    <h3 class="text-xs font-bold text-cyan-400 uppercase tracking-widest">Section Manager</h3>
                    <div id="section-toggles" class="space-y-3">
                        <!-- Toggles injected by JS -->
                    </div>
                </div>

                <div class="glass-card p-6 rounded-2xl space-y-4">
                    <h3 class="text-xs font-bold text-purple-400 uppercase tracking-widest">Identity Branding</h3>
                    <input type="text" id="edit-logo-text" placeholder="Logo Text (SP.)" class="admin-input">
                    <div class="relative w-32 h-32 rounded-2xl overflow-hidden bg-black/40 border border-white/10 group">
                        <img id="admin-profile-preview" src="https://ui-avatars.com/api/?name=Admin&background=06b6d4&color=fff&size=512" class="w-full h-full object-cover">
                        <label class="absolute inset-0 bg-black/60 flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer">
                            <i data-lucide="camera" class="h-6 w-6 mb-2"></i>
                            <span class="text-[8px] uppercase font-bold">Update Profile</span>
                            <input type="file" id="photo-upload" class="hidden" accept="image/*">
                        </label>
                    </div>
                    <div class="space-y-4 pt-4 border-t border-white/5">
                        <h3 class="text-xs font-bold text-cyan-400 uppercase tracking-widest">Resume PDF</h3>
                        <div class="flex items-center space-x-2">
                            <label class="flex-grow px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-[10px] font-bold uppercase tracking-widest cursor-pointer hover:bg-white/10 transition-all text-center">
                                <i data-lucide="file-text" class="h-4 w-4 inline mr-2"></i> Choose PDF
                                <input type="file" id="resume-upload" class="hidden" accept="application/pdf">
                            </label>
                            <a id="current-resume-link" href="#" target="_blank" class="w-12 h-12 flex items-center justify-center glass-card rounded-xl text-gray-500 hover:text-cyan-400"><i data-lucide="external-link" class="h-4 w-4"></i></a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main Workspace: Structured Forms -->
            <div class="lg:col-span-3 space-y-8">
                <!-- General Profile -->
                <div class="glass-card p-8 rounded-3xl space-y-6">
                    <div class="flex justify-between items-center">
                        <h3 class="text-xs font-bold text-cyan-400 uppercase tracking-widest">Global Profile</h3>
                        <i data-lucide="user" class="h-4 w-4 text-gray-600"></i>
                    </div>
                    <div class="grid md:grid-cols-2 gap-4">
                        <input type="text" id="edit-name" placeholder="Full name" class="admin-input">
                        <input type="text" id="edit-title" placeholder="Medical Title" class="admin-input">
                        <input type="text" id="edit-location" placeholder="Location" class="admin-input">
                        <input type="text" id="edit-edu-short" placeholder="Education (Hero)" class="admin-input">
                        <input type="text" id="edit-email" placeholder="Email" class="admin-input">
                        <input type="text" id="edit-phone" placeholder="Phone" class="admin-input">
                        <input type="text" id="edit-linkedin" placeholder="LinkedIn URL" class="admin-input">
                    </div>
                    <textarea id="edit-bio" rows="4" placeholder="Full Professional Bio" class="admin-input resize-none"></textarea>
                </div>

                <!-- Experience Editor -->
                <div class="glass-card p-8 rounded-3xl space-y-6">
                    <div class="flex justify-between items-center">
                        <h3 class="text-xs font-bold text-cyan-400 uppercase tracking-widest">Professional Path</h3>
                        <button onclick="addExperienceItem()" class="text-[10px] font-bold text-cyan-400 border border-cyan-400/30 px-3 py-1 rounded-full hover:bg-cyan-400/10 transition-all">+ Add Entry</button>
                    </div>
                    <div id="experience-editor-list" class="space-y-4">
                        <!-- Entries injected by JS -->
                    </div>
                </div>

                <!-- Competencies Editor -->
                <div class="glass-card p-8 rounded-3xl space-y-6">
                    <div class="flex justify-between items-center">
                        <h3 class="text-xs font-bold text-purple-400 uppercase tracking-widest">Core Competencies</h3>
                        <button onclick="addCompetencyItem()" class="text-[10px] font-bold text-purple-400 border border-purple-400/30 px-3 py-1 rounded-full hover:bg-purple-400/10 transition-all">+ Add Entry</button>
                    </div>
                    <div id="competencies-editor-list" class="grid md:grid-cols-2 gap-6">
                        <!-- Entries injected by JS -->
                    </div>
                </div>

                <!-- Certificates Gallery Editor -->
                <div class="glass-card p-8 rounded-3xl space-y-6">
                    <div class="flex justify-between items-center">
                        <h3 class="text-xs font-bold text-cyan-400 uppercase tracking-widest">Certificates Gallery</h3>
                        <button onclick="addCertificateItem()" class="text-[10px] font-bold text-cyan-400 border border-cyan-400/30 px-3 py-1 rounded-full hover:bg-cyan-400/10 transition-all">+ Add Certificate</button>
                    </div>
                    <div id="certificates-editor-list" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <!-- Entries injected by JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Script Entry -->
    <script src="app.js"></script>
    <script>
        // Lucide initialization for dynamic UI
        lucide.createIcons();
    </script>
</body>
</html>
