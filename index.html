<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate AI Resume Builder</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&family=Roboto+Mono:wght@400;500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- QR Code Lib -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <!-- HTML2PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Print Specifics */
        .page-break { page-break-after: always; }
        
        /* Theme Variables */
        :root {
            --primary-color: #2563eb;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-sidebar: #f8fafc;
        }

        /* Resume Layouts */
        #resume-preview {
            font-family: 'Inter', sans-serif;
            background: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        /* Modern Theme (Sidebar) */
        .theme-modern .resume-header { background-color: var(--primary-color); color: white; }
        .theme-modern .section-title { color: var(--primary-color); border-bottom: 2px solid var(--primary-color); }
        .theme-modern .sidebar { background-color: var(--bg-sidebar); border-right: 1px solid #e2e8f0; }
        
        /* Classic Theme (Centered) */
        .theme-classic .resume-header { text-align: center; border-bottom: 4px solid var(--primary-color); color: var(--text-main); }
        .theme-classic .section-title { text-align: center; color: var(--primary-color); text-transform: uppercase; letter-spacing: 2px; }
        .theme-classic .sidebar { display: none; } /* Merge sidebar into main for classic */
        .theme-classic .main-content { width: 100%; }
        
        /* Minimalist Theme */
        .theme-minimalist { font-family: 'Roboto Mono', monospace; }
        .theme-minimalist .resume-header { border-left: 5px solid var(--primary-color); padding-left: 1rem; }
        .theme-minimalist .section-title { font-weight: 700; letter-spacing: -1px; color: black; border-left: 2px solid var(--primary-color); padding-left: 0.5rem; }
        .theme-minimalist .sidebar { border-right: 1px dashed #ccc; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        .loader {
            border: 3px solid #f3f3f3; border-top: 3px solid var(--primary-color);
            border-radius: 50%; width: 20px; height: 20px;
            animation: spin 1s linear infinite; display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-100 h-screen flex overflow-hidden text-slate-800">

    <!-- ADMIN PANEL (Left) -->
    <aside class="w-1/2 flex flex-col bg-white border-r border-slate-200 shadow-xl z-10">
        <!-- Header -->
        <div class="p-4 bg-slate-900 text-white flex justify-between items-center">
            <h1 class="text-xl font-bold"><i class="fas fa-magic mr-2"></i>Ultimate Resume Builder</h1>
            <div class="flex gap-2">
                <button onclick="saveData()" class="px-3 py-1 bg-emerald-600 hover:bg-emerald-700 rounded text-xs font-bold transition"><i class="fas fa-save mr-1"></i> Save</button>
                <button onclick="loadData()" class="px-3 py-1 bg-blue-600 hover:bg-blue-700 rounded text-xs font-bold transition"><i class="fas fa-upload mr-1"></i> Load</button>
                <button onclick="downloadJSON()" class="px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded text-xs transition"><i class="fas fa-file-export"></i></button>
                <label class="px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded text-xs cursor-pointer transition">
                    <i class="fas fa-file-import"></i>
                    <input type="file" id="jsonInput" class="hidden" onchange="uploadJSON(this)">
                </label>
            </div>
        </div>

        <!-- Tabs -->
        <div class="flex border-b border-slate-200 overflow-x-auto">
            <button onclick="switchTab('personal')" class="tab-btn active px-4 py-3 text-sm font-medium text-blue-600 border-b-2 border-blue-600 whitespace-nowrap">Personal</button>
            <button onclick="switchTab('experience')" class="tab-btn px-4 py-3 text-sm font-medium text-slate-500 hover:text-slate-700 whitespace-nowrap">Experience</button>
            <button onclick="switchTab('education')" class="tab-btn px-4 py-3 text-sm font-medium text-slate-500 hover:text-slate-700 whitespace-nowrap">Education</button>
            <button onclick="switchTab('skills')" class="tab-btn px-4 py-3 text-sm font-medium text-slate-500 hover:text-slate-700 whitespace-nowrap">Skills</button>
            <button onclick="switchTab('projects')" class="tab-btn px-4 py-3 text-sm font-medium text-slate-500 hover:text-slate-700 whitespace-nowrap">Projects</button>
            <button onclick="switchTab('extras')" class="tab-btn px-4 py-3 text-sm font-medium text-slate-500 hover:text-slate-700 whitespace-nowrap">Extras</button>
            <button onclick="switchTab('settings')" class="tab-btn px-4 py-3 text-sm font-medium text-slate-500 hover:text-slate-700 whitespace-nowrap">Design</button>
        </div>

        <!-- Form Content -->
        <div class="flex-1 overflow-y-auto p-6 bg-slate-50" id="form-container">
            
            <!-- Personal Tab -->
            <div id="tab-personal" class="space-y-4 animate-fade-in">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="fullName" placeholder="Full Name" class="input-field w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" oninput="updatePreview()">
                    <input type="text" id="jobTitle" placeholder="Job Title" class="input-field w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" oninput="updatePreview()">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="email" id="email" placeholder="Email" class="input-field w-full p-3 border rounded-lg outline-none" oninput="updatePreview()">
                    <input type="tel" id="phone" placeholder="Phone" class="input-field w-full p-3 border rounded-lg outline-none" oninput="updatePreview()">
                </div>
                <input type="text" id="location" placeholder="Location (City, Country)" class="input-field w-full p-3 border rounded-lg outline-none" oninput="updatePreview()">
                <input type="url" id="website" placeholder="Website / Portfolio URL" class="input-field w-full p-3 border rounded-lg outline-none" oninput="updatePreview()">
                <input type="url" id="linkedin" placeholder="LinkedIn URL" class="input-field w-full p-3 border rounded-lg outline-none" oninput="updatePreview()">
                <input type="url" id="github" placeholder="GitHub URL" class="input-field w-full p-3 border rounded-lg outline-none" oninput="updatePreview()">
                <textarea id="summary" rows="4" placeholder="Professional Summary" class="input-field w-full p-3 border rounded-lg outline-none" oninput="updatePreview(); countWords()"></textarea>
                <div class="text-xs text-slate-500 flex justify-between">
                    <span id="wordCount">0 words</span>
                    <span id="readTime">0 min read</span>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Profile Photo URL</label>
                    <input type="url" id="photoUrl" placeholder="https://..." class="input-field w-full p-3 border rounded-lg outline-none" oninput="updatePreview()">
                </div>
            </div>

            <!-- Experience Tab -->
            <div id="tab-experience" class="hidden space-y-4 animate-fade-in">
                <div id="experience-list" class="space-y-4"></div>
                <button onclick="addExperience()" class="w-full py-3 border-2 border-dashed border-slate-300 rounded-lg text-slate-500 hover:border-blue-500 hover:text-blue-500 transition font-medium">
                    <i class="fas fa-plus-circle mr-2"></i>Add Position
                </button>
            </div>

            <!-- Education Tab -->
            <div id="tab-education" class="hidden space-y-4 animate-fade-in">
                <div id="education-list" class="space-y-4"></div>
                <button onclick="addEducation()" class="w-full py-3 border-2 border-dashed border-slate-300 rounded-lg text-slate-500 hover:border-blue-500 hover:text-blue-500 transition font-medium">
                    <i class="fas fa-graduation-cap mr-2"></i>Add Education
                </button>
            </div>

            <!-- Skills Tab -->
            <div id="tab-skills" class="hidden space-y-4 animate-fade-in">
                <div class="bg-blue-50 p-4 rounded-lg">
                    <label class="block text-sm font-bold text-blue-800 mb-2">Add Skills (Comma separated)</label>
                    <div class="flex gap-2">
                        <input type="text" id="newSkillInput" placeholder="e.g. React, Python, Leadership" class="flex-1 p-2 border rounded outline-none">
                        <button onclick="addSkillFromInput()" class="bg-blue-600 text-white px-4 rounded hover:bg-blue-700">Add</button>
                    </div>
                </div>
                <div id="skills-container" class="flex flex-wrap gap-2"></div>
            </div>

            <!-- Projects Tab -->
            <div id="tab-projects" class="hidden space-y-4 animate-fade-in">
                <div id="projects-list" class="space-y-4"></div>
                <button onclick="addProject()" class="w-full py-3 border-2 border-dashed border-slate-300 rounded-lg text-slate-500 hover:border-blue-500 hover:text-blue-500 transition font-medium">
                    <i class="fas fa-folder-plus mr-2"></i>Add Project
                </button>
            </div>

            <!-- Extras Tab -->
            <div id="tab-extras" class="hidden space-y-4 animate-fade-in">
                <div>
                    <label class="block text-sm font-medium mb-1">Certifications</label>
                    <div id="certifications-list" class="space-y-2"></div>
                    <button onclick="addCertification()" class="text-sm text-blue-600 hover:underline mt-2">+ Add Certification</button>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Languages</label>
                    <div id="languages-list" class="space-y-2"></div>
                    <button onclick="addLanguage()" class="text-sm text-blue-600 hover:underline mt-2">+ Add Language</button>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Interests</label>
                    <input type="text" id="interests" placeholder="Chess, Hiking, Open Source" class="w-full p-2 border rounded" oninput="updatePreview()">
                </div>
            </div>

            <!-- Settings Tab -->
            <div id="tab-settings" class="hidden space-y-6 animate-fade-in">
                <div>
                    <label class="block text-sm font-bold mb-2">Theme Layout</label>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="setTheme('modern')" class="theme-option p-3 border rounded hover:bg-slate-100 text-center focus:ring-2 ring-blue-500" data-theme="modern">Modern</button>
                        <button onclick="setTheme('classic')" class="theme-option p-3 border rounded hover:bg-slate-100 text-center focus:ring-2 ring-blue-500" data-theme="classic">Classic</button>
                        <button onclick="setTheme('minimalist')" class="theme-option p-3 border rounded hover:bg-slate-100 text-center focus:ring-2 ring-blue-500" data-theme="minimalist">Minimal</button>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2">Accent Color</label>
                    <input type="color" id="accentColor" value="#2563eb" class="w-full h-10 rounded cursor-pointer" oninput="updateColors()">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2">Font Family</label>
                    <select id="fontFamily" onchange="updateFonts()" class="w-full p-2 border rounded">
                        <option value="'Inter', sans-serif">Inter (Modern)</option>
                        <option value="'Playfair Display', serif">Playfair (Elegant)</option>
                        <option value="'Roboto Mono', monospace">Roboto Mono (Tech)</option>
                        <option value="'Lato', sans-serif">Lato (Clean)</option>
                    </select>
                </div>
                <div class="pt-4 border-t">
                    <button onclick="generatePDF()" class="w-full bg-red-600 text-white py-3 rounded-lg font-bold hover:bg-red-700 shadow-lg transition transform hover:-translate-y-1">
                        <i class="fas fa-file-pdf mr-2"></i> Download PDF
                    </button>
                </div>
            </div>
        </div>
    </aside>

    <!-- PREVIEW PANEL (Right) -->
    <main class="w-1/2 bg-slate-200 flex flex-col relative overflow-hidden">
        <div class="absolute top-4 right-4 z-20 flex gap-2">
            <button onclick="toggleFullscreen()" class="bg-white p-2 rounded shadow hover:bg-slate-50 text-slate-600" title="Toggle Zoom"><i class="fas fa-expand"></i></button>
        </div>
        
        <div class="flex-1 overflow-y-auto p-8 flex justify-center" id="preview-scroll">
            <!-- A4 Paper Simulation -->
            <div id="resume-preview" class="theme-modern w-[210mm] min-h-[297mm] bg-white text-slate-800 flex shadow-2xl relative">
                
                <!-- Sidebar (Left Column) -->
                <div class="sidebar w-1/3 p-6 flex flex-col gap-6">
                    <div class="text-center">
                        <img id="preview-photo" src="" alt="Profile" class="w-32 h-32 rounded-full mx-auto object-cover border-4 border-white shadow-md hidden">
                    </div>
                    
                    <div class="space-y-3 text-sm">
                        <div class="flex items-center gap-2 contact-item"><i class="fas fa-envelope w-5 text-center"></i> <span id="prev-email" class="break-all"></span></div>
                        <div class="flex items-center gap-2 contact-item"><i class="fas fa-phone w-5 text-center"></i> <span id="prev-phone"></span></div>
                        <div class="flex items-center gap-2 contact-item"><i class="fas fa-map-marker-alt w-5 text-center"></i> <span id="prev-location"></span></div>
                        <div class="flex items-center gap-2 contact-item"><i class="fas fa-globe w-5 text-center"></i> <a id="prev-website" href="#" target="_blank" class="hover:underline break-all"></a></div>
                        <div class="flex items-center gap-2 contact-item"><i class="fab fa-linkedin w-5 text-center"></i> <a id="prev-linkedin" href="#" target="_blank" class="hover:underline break-all"></a></div>
                        <div class="flex items-center gap-2 contact-item"><i class="fab fa-github w-5 text-center"></i> <a id="prev-github" href="#" target="_blank" class="hover:underline break-all"></a></div>
                    </div>

                    <div class="border-t border-slate-300 pt-4">
                        <h3 class="section-title text-sm font-bold uppercase tracking-wider mb-3">Skills</h3>
                        <div id="prev-skills" class="flex flex-wrap gap-2"></div>
                    </div>

                    <div class="border-t border-slate-300 pt-4">
                        <h3 class="section-title text-sm font-bold uppercase tracking-wider mb-3">Education</h3>
                        <div id="prev-education" class="space-y-3 text-sm"></div>
                    </div>

                    <div class="border-t border-slate-300 pt-4">
                        <h3 class="section-title text-sm font-bold uppercase tracking-wider mb-3">Languages</h3>
                        <div id="prev-languages" class="space-y-1 text-sm"></div>
                    </div>
                    
                    <div class="border-t border-slate-300 pt-4">
                        <h3 class="section-title text-sm font-bold uppercase tracking-wider mb-3">Interests</h3>
                        <p id="prev-interests" class="text-sm italic"></p>
                    </div>

                    <!-- QR Code Area -->
                    <div class="mt-auto pt-4 text-center">
                        <div id="qrcode" class="flex justify-center"></div>
                        <p class="text-[10px] text-slate-400 mt-1">Scan for Portfolio</p>
                    </div>
                </div>

                <!-- Main Content (Right Column) -->
                <div class="main-content w-2/3 p-8">
                    <header class="resume-header mb-8 pb-4">
                        <h1 id="prev-name" class="text-4xl font-bold leading-tight mb-2"></h1>
                        <p id="prev-title" class="text-xl opacity-90 font-medium"></p>
                    </header>

                    <section class="mb-6">
                        <h3 class="section-title text-lg font-bold uppercase tracking-wider mb-3 border-b pb-1">Profile</h3>
                        <p id="prev-summary" class="text-sm leading-relaxed text-justify"></p>
                    </section>

                    <section class="mb-6">
                        <h3 class="section-title text-lg font-bold uppercase tracking-wider mb-4 border-b pb-1">Experience</h3>
                        <div id="prev-experience" class="space-y-4"></div>
                    </section>

                    <section class="mb-6">
                        <h3 class="section-title text-lg font-bold uppercase tracking-wider mb-4 border-b pb-1">Projects</h3>
                        <div id="prev-projects" class="space-y-3"></div>
                    </section>

                    <section class="mb-6">
                        <h3 class="section-title text-lg font-bold uppercase tracking-wider mb-4 border-b pb-1">Certifications</h3>
                        <div id="prev-certifications" class="grid grid-cols-2 gap-2 text-sm"></div>
                    </section>
                </div>
            </div>
        </div>
    </main>

    <!-- TEMPLATES (Hidden) -->
    <template id="exp-template">
        <div class="bg-white p-4 rounded shadow-sm border border-slate-200 relative group">
            <button onclick="this.parentElement.remove(); updatePreview()" class="absolute top-2 right-2 text-red-400 hover:text-red-600"><i class="fas fa-trash"></i></button>
            <input type="text" placeholder="Job Title" class="exp-title w-full font-bold border-b border-transparent focus:border-blue-500 outline-none mb-1" oninput="updatePreview()">
            <input type="text" placeholder="Company Name" class="exp-company w-full text-sm text-slate-600 border-b border-transparent focus:border-blue-500 outline-none mb-2" oninput="updatePreview()">
            <div class="flex gap-2 mb-2">
                <input type="text" placeholder="Start Date" class="exp-start w-1/2 text-xs p-1 bg-slate-50 rounded border" oninput="updatePreview()">
                <input type="text" placeholder="End Date (or Present)" class="exp-end w-1/2 text-xs p-1 bg-slate-50 rounded border" oninput="updatePreview()">
            </div>
            <textarea placeholder="Describe your achievements..." class="exp-desc w-full text-sm p-2 bg-slate-50 rounded border resize-none h-24" oninput="updatePreview()"></textarea>
            <button onclick="aiRewrite(this)" class="mt-2 text-xs bg-purple-100 text-purple-700 px-2 py-1 rounded hover:bg-purple-200 transition"><i class="fas fa-magic mr-1"></i> AI Polish</button>
        </div>
    </template>

    <template id="edu-template">
        <div class="bg-white p-4 rounded shadow-sm border border-slate-200 relative">
            <button onclick="this.parentElement.remove(); updatePreview()" class="absolute top-2 right-2 text-red-400 hover:text-red-600"><i class="fas fa-trash"></i></button>
            <input type="text" placeholder="Degree / Certificate" class="edu-degree w-full font-bold border-b border-transparent focus:border-blue-500 outline-none mb-1" oninput="updatePreview()">
            <input type="text" placeholder="School / University" class="edu-school w-full text-sm text-slate-600 border-b border-transparent focus:border-blue-500 outline-none mb-2" oninput="updatePreview()">
            <input type="text" placeholder="Graduation Year" class="edu-year w-full text-xs p-1 bg-slate-50 rounded border" oninput="updatePreview()">
        </div>
    </template>

    <template id="proj-template">
        <div class="bg-white p-4 rounded shadow-sm border border-slate-200 relative">
            <button onclick="this.parentElement.remove(); updatePreview()" class="absolute top-2 right-2 text-red-400 hover:text-red-600"><i class="fas fa-trash"></i></button>
            <input type="text" placeholder="Project Name" class="proj-title w-full font-bold border-b border-transparent focus:border-blue-500 outline-none mb-1" oninput="updatePreview()">
            <input type="url" placeholder="Project Link" class="proj-link w-full text-xs text-blue-500 mb-2" oninput="updatePreview()">
            <textarea placeholder="Tech stack & description..." class="proj-desc w-full text-sm p-2 bg-slate-50 rounded border resize-none h-20" oninput="updatePreview()"></textarea>
        </div>
    </template>

    <template id="cert-template">
        <div class="flex gap-2">
            <input type="text" placeholder="Certification Name" class="w-full text-sm p-2 border rounded" oninput="updatePreview()">
            <button onclick="this.parentElement.remove(); updatePreview()" class="text-red-500"><i class="fas fa-times"></i></button>
        </div>
    </template>

    <template id="lang-template">
        <div class="flex gap-2">
            <input type="text" placeholder="Language" class="w-1/2 text-sm p-2 border rounded" oninput="updatePreview()">
            <input type="text" placeholder="Level (e.g. Native)" class="w-1/2 text-sm p-2 border rounded" oninput="updatePreview()">
            <button onclick="this.parentElement.remove(); updatePreview()" class="text-red-500"><i class="fas fa-times"></i></button>
        </div>
    </template>

    <script>
        // State Management
        let state = {
            personal: {},
            experience: [],
            education: [],
            skills: [],
            projects: [],
            certifications: [],
            languages: [],
            settings: { theme: 'modern', color: '#2563eb', font: "'Inter', sans-serif" }
        };

        // Initialization
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            addExperience(); // Add one empty slot by default
            addEducation();
            setTheme(state.settings.theme);
            updateColors();
            updateFonts();
        });

        // Tab Switching
        function switchTab(tabId) {
            document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active', 'text-blue-600', 'border-b-2', 'border-blue-600');
                btn.classList.add('text-slate-500');
            });
            event.target.classList.add('active', 'text-blue-600', 'border-b-2', 'border-blue-600');
            event.target.classList.remove('text-slate-500');
        }

        // --- Dynamic List Handlers ---

        function addExperience() {
            const container = document.getElementById('experience-list');
            const clone = document.getElementById('exp-template').content.cloneNode(true);
            container.appendChild(clone);
            updatePreview();
        }

        function addEducation() {
            const container = document.getElementById('education-list');
            const clone = document.getElementById('edu-template').content.cloneNode(true);
            container.appendChild(clone);
            updatePreview();
        }

        function addProject() {
            const container = document.getElementById('projects-list');
            const clone = document.getElementById('proj-template').content.cloneNode(true);
            container.appendChild(clone);
            updatePreview();
        }

        function addCertification() {
            const container = document.getElementById('certifications-list');
            const clone = document.getElementById('cert-template').content.cloneNode(true);
            container.appendChild(clone);
            updatePreview();
        }

        function addLanguage() {
            const container = document.getElementById('languages-list');
            const clone = document.getElementById('lang-template').content.cloneNode(true);
            container.appendChild(clone);
            updatePreview();
        }

        function addSkillFromInput() {
            const input = document.getElementById('newSkillInput');
            const skills = input.value.split(',').map(s => s.trim()).filter(s => s);
            if(skills.length) {
                state.skills = [...state.skills, ...skills];
                input.value = '';
                renderSkillsAdmin();
                updatePreview();
                saveData();
            }
        }

        function removeSkill(skill) {
            state.skills = state.skills.filter(s => s !== skill);
            renderSkillsAdmin();
            updatePreview();
            saveData();
        }

        function renderSkillsAdmin() {
            const container = document.getElementById('skills-container');
            container.innerHTML = '';
            state.skills.forEach(skill => {
                const tag = document.createElement('div');
                tag.className = 'bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-sm flex items-center gap-2';
                tag.innerHTML = `${skill} <button onclick="removeSkill('${skill}')" class="hover:text-red-600"><i class="fas fa-times"></i></button>`;
                container.appendChild(tag);
            });
        }

        // --- Preview Logic ---

        function updatePreview() {
            // Personal
            const fields = ['fullName', 'jobTitle', 'email', 'phone', 'location', 'website', 'linkedin', 'github', 'summary', 'photoUrl', 'interests'];
            fields.forEach(id => {
                const val = document.getElementById(id).value;
                state.personal[id] = val;
                
                // Map to preview IDs
                const map = { fullName: 'prev-name', jobTitle: 'prev-title', email: 'prev-email', phone: 'prev-phone', location: 'prev-location', website: 'prev-website', linkedin: 'prev-linkedin', github: 'prev-github', summary: 'prev-summary', interests: 'prev-interests' };
                if(map[id]) {
                    const el = document.getElementById(map[id]);
                    if(el) {
                        el.innerText = val;
                        if(id === 'photoUrl') {
                            const img = document.getElementById('preview-photo');
                            if(val) { img.src = val; img.classList.remove('hidden'); } 
                            else { img.classList.add('hidden'); }
                        }
                        if(['website', 'linkedin', 'github'].includes(id)) el.href = val.startsWith('http') ? val : `https://${val}`;
                    }
                }
            });

            // Experience
            const expContainer = document.getElementById('prev-experience');
            expContainer.innerHTML = '';
            document.querySelectorAll('#experience-list > div').forEach(div => {
                const title = div.querySelector('.exp-title').value;
                const company = div.querySelector('.exp-company').value;
                const start = div.querySelector('.exp-start').value;
                const end = div.querySelector('.exp-end').value;
                const desc = div.querySelector('.exp-desc').value;
                
                if(title || company) {
                    const item = document.createElement('div');
                    item.className = 'mb-4';
                    item.innerHTML = `
                        <div class="flex justify-between items-baseline">
                            <h4 class="font-bold text-base">${title}</h4>
                            <span class="text-xs font-mono bg-slate-100 px-2 py-1 rounded">${start} - ${end}</span>
                        </div>
                        <div class="text-sm text-blue-600 font-medium mb-1">${company}</div>
                        <p class="text-sm text-slate-600 whitespace-pre-line">${desc}</p>
                    `;
                    expContainer.appendChild(item);
                }
            });

            // Education
            const eduContainer = document.getElementById('prev-education');
            eduContainer.innerHTML = '';
            document.querySelectorAll('#education-list > div').forEach(div => {
                const degree = div.querySelector('.edu-degree').value;
                const school = div.querySelector('.edu-school').value;
                const year = div.querySelector('.edu-year').value;
                
                if(degree || school) {
                    const item = document.createElement('div');
                    item.innerHTML = `
                        <div class="font-bold text-sm">${degree}</div>
                        <div class="text-xs text-slate-600">${school}</div>
                        <div class="text-xs text-slate-400">${year}</div>
                    `;
                    eduContainer.appendChild(item);
                }
            });

            // Projects
            const projContainer = document.getElementById('prev-projects');
            projContainer.innerHTML = '';
            document.querySelectorAll('#projects-list > div').forEach(div => {
                const title = div.querySelector('.proj-title').value;
                const link = div.querySelector('.proj-link').value;
                const desc = div.querySelector('.proj-desc').value;
                
                if(title) {
                    const item = document.createElement('div');
                    item.innerHTML = `
                        <div class="flex justify-between">
                            <h4 class="font-bold text-sm">${title}</h4>
                            ${link ? `<a href="${link}" target="_blank" class="text-xs text-blue-500"><i class="fas fa-external-link-alt"></i></a>` : ''}
                        </div>
                        <p class="text-xs text-slate-600 mt-1">${desc}</p>
                    `;
                    projContainer.appendChild(item);
                }
            });

            // Certs & Langs
            const certContainer = document.getElementById('prev-certifications');
            certContainer.innerHTML = '';
            document.querySelectorAll('#certifications-list input').forEach(inp => {
                if(inp.value) {
                    const d = document.createElement('div');
                    d.className = 'flex items-center gap-2';
                    d.innerHTML = `<i class="fas fa-certificate text-yellow-500 text-xs"></i> <span>${inp.value}</span>`;
                    certContainer.appendChild(d);
                }
            });

            const langContainer = document.getElementById('prev-languages');
            langContainer.innerHTML = '';
            document.querySelectorAll('#languages-list > div').forEach(div => {
                const lang = div.children[0].value;
                const level = div.children[1].value;
                if(lang) {
                    const d = document.createElement('div');
                    d.className = 'flex justify-between border-b border-slate-100 py-1';
                    d.innerHTML = `<span>${lang}</span> <span class="text-slate-400 text-xs">${level}</span>`;
                    langContainer.appendChild(d);
                }
            });

            // Skills & Interests
            renderSkillsPreview();
            document.getElementById('prev-interests').innerText = document.getElementById('interests').value;

            // QR Code
            updateQR();
            
            // Stats
            countWords();
        }

        function renderSkillsPreview() {
            const container = document.getElementById('prev-skills');
            container.innerHTML = '';
            state.skills.forEach(skill => {
                const span = document.createElement('span');
                span.className = 'inline-block bg-slate-100 text-slate-700 text-xs px-2 py-1 rounded mb-1';
                span.innerText = skill;
                container.appendChild(span);
            });
        }

        function updateQR() {
            const url = document.getElementById('website').value || document.getElementById('linkedin').value || window.location.href;
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = '';
            new QRCode(qrContainer, {
                text: url,
                width: 64,
                height: 64,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        function countWords() {
            const text = document.getElementById('summary').value;
            const words = text.trim().split(/\s+/).filter(w => w.length > 0).length;
            document.getElementById('wordCount').innerText = `${words} words`;
            document.getElementById('readTime').innerText = `${Math.ceil(words / 200)} min read`;
        }

        // --- Design Settings ---

        function setTheme(themeName) {
            const preview = document.getElementById('resume-preview');
            preview.className = `theme-${themeName} w-[210mm] min-h-[297mm] bg-white text-slate-800 flex shadow-2xl relative`;
            state.settings.theme = themeName;
            
            // Update UI buttons
            document.querySelectorAll('.theme-option').forEach(btn => {
                if(btn.dataset.theme === themeName) btn.classList.add('ring-2', 'ring-blue-500', 'bg-blue-50');
                else btn.classList.remove('ring-2', 'ring-blue-500', 'bg-blue-50');
            });
            updatePreview();
        }

        function updateColors() {
            const color = document.getElementById('accentColor').value;
            document.documentElement.style.setProperty('--primary-color', color);
            state.settings.color = color;
        }

        function updateFonts() {
            const font = document.getElementById('fontFamily').value;
            document.getElementById('resume-preview').style.fontFamily = font;
            state.settings.font = font;
        }

        // --- AI Simulator ---
        function aiRewrite(btn) {
            const originalText = btn.previousElementSibling.value;
            const loader = document.createElement('span');
            loader.className = 'loader ml-2';
            btn.appendChild(loader);
            btn.disabled = true;

            setTimeout(() => {
                const improvements = [
                    "Spearheaded initiative resulting in 20% efficiency gain.",
                    "Developed robust solutions using modern tech stacks.",
                    "Collaborated cross-functionally to deliver key project milestones.",
                    "Optimized workflows reducing turnaround time by 15%."
                ];
                const randomImp = improvements[Math.floor(Math.random() * improvements.length)];
                btn.previousElementSibling.value = originalText + "\n\n• " + randomImp;
                btn.removeChild(loader);
                btn.disabled = false;
                updatePreview();
            }, 1500);
        }

        // --- Storage & IO ---

        function saveData() {
            // Gather all form data into state
            // (Simplified for brevity: In prod, gather all inputs systematically)
            // Here we rely on the live update logic having populated state partially, 
            // but for lists we need to scrape DOM or maintain strict state.
            // For this demo, we'll save the Personal and Settings fully, and serialize DOM for lists.
            
            const dataToSave = {
                personal: state.personal,
                skills: state.skills,
                settings: state.settings,
                // Serialize complex lists from DOM to keep it simple for this single-file demo
                experience: Array.from(document.querySelectorAll('#experience-list > div')).map(div => ({
                    title: div.querySelector('.exp-title').value,
                    company: div.querySelector('.exp-company').value,
                    start: div.querySelector('.exp-start').value,
                    end: div.querySelector('.exp-end').value,
                    desc: div.querySelector('.exp-desc').value
                })),
                education: Array.from(document.querySelectorAll('#education-list > div')).map(div => ({
                    degree: div.querySelector('.edu-degree').value,
                    school: div.querySelector('.edu-school').value,
                    year: div.querySelector('.edu-year').value
                })),
                projects: Array.from(document.querySelectorAll('#projects-list > div')).map(div => ({
                    title: div.querySelector('.proj-title').value,
                    link: div.querySelector('.proj-link').value,
                    desc: div.querySelector('.proj-desc').value
                })),
                certifications: Array.from(document.querySelectorAll('#certifications-list input')).map(i => i.value),
                languages: Array.from(document.querySelectorAll('#languages-list > div')).map(div => ({
                    lang: div.children[0].value,
                    level: div.children[1].value
                })),
                interests: document.getElementById('interests').value
            };

            localStorage.setItem('resumeBuilderData', JSON.stringify(dataToSave));
            alert('Draft saved locally!');
        }

        function loadData() {
            const data = localStorage.getItem('resumeBuilderData');
            if(!data) return;
            const parsed = JSON.parse(data);
            
            // Restore Personal
            Object.keys(parsed.personal).forEach(key => {
                if(document.getElementById(key)) document.getElementById(key).value = parsed.personal[key];
            });
            document.getElementById('interests').value = parsed.interests || '';
            
            // Restore Settings
            if(parsed.settings) {
                document.getElementById('accentColor').value = parsed.settings.color;
                document.getElementById('fontFamily').value = parsed.settings.font;
                setTheme(parsed.settings.theme);
                updateColors();
                updateFonts();
            }

            // Restore Lists
            state.skills = parsed.skills || [];
            renderSkillsAdmin();

            // Clear defaults
            document.getElementById('experience-list').innerHTML = '';
            document.getElementById('education-list').innerHTML = '';
            document.getElementById('projects-list').innerHTML = '';
            document.getElementById('certifications-list').innerHTML = '';
            document.getElementById('languages-list').innerHTML = '';

            (parsed.experience || []).forEach(() => addExperience());
            (parsed.education || []).forEach(() => addEducation());
            (parsed.projects || []).forEach(() => addProject());
            
            // Populate values after adding elements
            setTimeout(() => {
                const expEls = document.querySelectorAll('#experience-list > div');
                parsed.experience?.forEach((item, i) => {
                    if(expEls[i]) {
                        expEls[i].querySelector('.exp-title').value = item.title;
                        expEls[i].querySelector('.exp-company').value = item.company;
                        expEls[i].querySelector('.exp-start').value = item.start;
                        expEls[i].querySelector('.exp-end').value = item.end;
                        expEls[i].querySelector('.exp-desc').value = item.desc;
                    }
                });

                const eduEls = document.querySelectorAll('#education-list > div');
                parsed.education?.forEach((item, i) => {
                    if(eduEls[i]) {
                        eduEls[i].querySelector('.edu-degree').value = item.degree;
                        eduEls[i].querySelector('.edu-school').value = item.school;
                        eduEls[i].querySelector('.edu-year').value = item.year;
                    }
                });
                
                // Similar for projects, certs, langs... (omitted for brevity but follows same pattern)
                
                updatePreview();
            }, 100);
        }

        function downloadJSON() {
            saveData(); // Ensure latest
            const data = localStorage.getItem('resumeBuilderData');
            const blob = new Blob([data], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'resume-data.json';
            a.click();
        }

        function uploadJSON(input) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                localStorage.setItem('resumeBuilderData', e.target.result);
                loadData();
                alert('Resume imported successfully!');
            };
            reader.readAsText(file);
        }

        // --- PDF Generation ---
        function generatePDF() {
            const element = document.getElementById('resume-preview');
            const name = document.getElementById('fullName').value || 'resume';
            
            // Temporarily remove shadow/border for clean PDF
            const originalShadow = element.style.boxShadow;
            element.style.boxShadow = 'none';
            
            const opt = {
                margin: 0,
                filename: `${name.replace(/\s+/g, '_')}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                element.style.boxShadow = originalShadow;
            });
        }

        function toggleFullscreen() {
            const main = document.querySelector('main');
            if (!document.fullscreenElement) {
                main.requestFullscreen().catch(err => alert(`Error: ${err.message}`));
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
