<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Premium</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body { background:#050505; color:white; font-family: Inter, sans-serif; }

.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
  transition: all 0.3s ease;
}
.glass:hover {
  transform: translateY(-4px);
  border-color: rgba(6,182,212,0.4);
}

.a4 {
  width:794px;
  min-height:1123px;
  background:white;
  color:black;
  padding:40px;
}

.fade { animation: fade 0.6s ease; }
@keyframes fade {
  from { opacity:0; transform:translateY(10px);}
  to { opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="max-w-4xl mx-auto px-6 py-10">

  <div id="app" class="space-y-6 fade"></div>

</div>

<button id="adminBtn" class="fixed bottom-6 right-6 bg-cyan-500 hover:bg-cyan-600 p-3 rounded-full shadow-lg">⚙</button>
<button onclick="downloadPDF()" class="fixed bottom-6 left-6 bg-purple-600 hover:bg-purple-700 p-3 rounded shadow-lg">PDF</button>

<div id="adminPanel" class="hidden fixed inset-0 bg-black/95 p-6 overflow-auto">
  <input type="password" id="adminPass" placeholder="Password" class="p-2 text-black"/>
  <button onclick="checkPass()" class="bg-green-500 p-2">Enter</button>

  <div id="adminContent" class="hidden mt-6 space-y-4"></div>
</div>

<div id="resumeA4" class="hidden"></div>

<script type="module" src="app.js"></script>

</body>
</html>
