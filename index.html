<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Premium</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body { 
  background: radial-gradient(circle at top right, #0a0a0a, #050505); 
  color: white; 
  font-family: 'Inter', sans-serif; 
  min-height: 100vh;
}

.glass {
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.05);
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.glass:hover {
  background: rgba(255,255,255,0.06);
  border-color: rgba(6,182,212,0.3);
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.a4 {
  width:794px;
  min-height:1123px;
  background:white;
  color:black;
  padding:60px;
}

.fade { animation: fade 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
@keyframes fade {
  from { opacity:0; transform:translateY(20px);}
  to { opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="max-w-4xl mx-auto px-6 py-10">

  <div id="app" class="space-y-6 fade">
    <div class="p-8 text-center text-gray-400">
      Portfolio loading...
    </div>
  </div>

</div>

<button id="adminBtn" class="fixed bottom-6 right-6 bg-cyan-500 hover:bg-cyan-600 p-3 rounded-full shadow-lg">⚙</button>
<button onclick="downloadPDF()" class="fixed bottom-6 left-6 bg-purple-600 hover:bg-purple-700 p-3 rounded shadow-lg">PDF</button>

<div id="adminPanel" class="hidden fixed inset-0 bg-black/95 p-6 overflow-auto">
  <input type="password" id="adminPass" placeholder="Password" class="p-2 text-black"/>
  <button onclick="checkPass()" class="bg-green-500 p-2">Enter</button>

  <div id="adminContent" class="hidden mt-6 space-y-4"></div>
</div>

<div id="resumeA4" class="hidden"></div>

<script type="module" src="app.js"></script>

</body>
</html>
